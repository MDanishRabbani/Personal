baseURL: "https://danishrabbani.my.id/"
title: "Muhammad Danish Rabbani"
defaultContentLanguage: "id"
defaultContentLanguageInSubdir: false
pagination:
  pagerSize: 5
enableRobotsTXT: true

params:
  author: "Muhammad Danish Rabbani"
  description: "Full-Stack Developer, IT Software Engineer, dan founder SatuInovasi.com."
  keywords:
    - "Muhammad Danish Rabbani"
    - "Programmer di Medan"
    - "Full-Stack Developer"
    - "IT Software Engineer"
    - "Web Development"
    - "Mobile Development"
    - "DevOps"
    - "Cloud"
    - "Automation"
  env: "production"
  defaultTheme: "auto"
  displayFullLangName: true
  disableThemeToggle: false
  disableLangToggle: false
  mainSections:
    - "post"
  ShowReadingTime: false
  ShowShareButtons: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowPostNavLinks: true
  ShowRssButtonInSectionTermList: true
  hideFooter: false
  assets:
