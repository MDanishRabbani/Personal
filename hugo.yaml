    favicon16x16: "images/profile.svg"
    favicon32x32: "images/profile.svg"
    apple_touch_icon: "images/profile.svg"
    safari_pinned_tab: "images/profile.svg"
    theme_color: "#0f172a"
    msapplication_TileColor: "#0f172a"
  socialIcons:
    - name: "linkedin"
      url: "https://www.linkedin.com/in/muhammad-danish-rabbani/"
    - name: "github"
      url: "https://github.com/MDanishRabbani"
    - name: "instagram"
      url: "https://www.instagram.com/mhd.danish.r/"
    - name: "youtube"
      url: "https://www.youtube.com/channel/UCETZi0yu6nPYageqoBWnt4g"

